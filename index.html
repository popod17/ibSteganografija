<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steganografija</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Top Bar -->
    <div class="top-bar">
        <div class="logo-placeholder">
            <p style="font-family: 'Product Sans', cursive; font-size: 23px;">
                <b>Stego </b> <span style="color: rgb(121, 121, 121);">Photos</span>
        </div>
        <div class="search-wrapper">
            <img src="slikicki/search.svg" alt="search-icon" style="width: 26px; background-color: #f8caca; border-radius: 50%; padding: 5px;">
            <input class="fake-search-bar" type="text" placeholder="Search...">
        </div>
        <img src="slikicki/account.svg" alt="account-image" class="profile-pic">

    </div>

    <!-- Body Layout -->
    <div class="body-layout">

        <!-- Sidebar -->
        <nav class="sidebar">
            <button class="sidebar-btn active" onclick="loadGallery()">Галерија</button>
            <button class="sidebar-btn">Settings</button>
            <button class="sidebar-btn">About</button>
        </nav>

        <!-- Main Content -->
        <main class="main-content">

            <!-- ── GALLERY SECTION ── -->
            <section class="content-section" id="section-gallery">
                <div class="gallery-grid" id="gallery-grid"></div>
            </section>

        </main>
    </div>

    <!-- ── UPLOAD MODAL ── -->
    <div class="modal-overlay" id="upload-overlay" hidden onclick="handleUploadOverlayClick(event)">
        <div class="modal-box">
            <div class="modal-header">
                <span class="modal-title">Прикачи слика со тајна</span>
                <button class="modal-close-btn" onclick="closeUploadModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p class="stego-intro" style="margin-bottom:4px;">
                    Избери слика и внеси тајна порака. За png слики можно е енкодирање со LSB, а за JPEG можно е користење на DCT или во метадата на сликата.
                </p>
                <label class="stego-label" for="upload-file-input">Избери слика</label>
                <input class="stego-file-input" type="file" id="upload-file-input" accept="image/*">

                <div id="jpeg-method-selector" style="display:none; margin: 8px 0 4px;">
                    <label class="stego-label" style="margin-bottom:4px;">Метод за енкодирање</label>
                    <div style="display:flex; gap:20px; align-items:center; margin-top:4px;">
                        <label style="display:flex; align-items:center; gap:6px; cursor:pointer; font-size:13px;">
                            <input type="radio" name="jpeg-method" value="dct" checked> DCT
                        </label>
                        <label style="display:flex; align-items:center; gap:6px; cursor:pointer; font-size:13px;">
                            <input type="radio" name="jpeg-method" value="exif"> EXIF метадата
                        </label>
                    </div>
                </div>

                <div id="robust-mode-selector" style="margin: 8px 0 4px;">
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px;">
                        <input type="checkbox" id="robust-mode-checkbox">
                        <span><strong>Robust mode</strong> — против компресија (помал капацитет) </span>
                    </label>
                    <div class="stego-hint" id="robust-capacity-hint" style="display:none; margin-top:4px;"></div>
                </div>

                <label class="stego-label" for="upload-message">Тајна порака</label>
                <textarea class="stego-textarea" style="resize: none;" id="upload-message" rows="5"
                    placeholder="Внеси тајна порака."></textarea>

                <button class="stego-action-btn" id="upload-btn" onclick="uploadImage()">Енкодирај и прикачи</button>
                <div class="status-msg status-info" id="upload-status"></div>
            </div>
        </div>
    </div>

    <!-- ── PLAIN UPLOAD MODAL ── -->
    <div class="modal-overlay" id="plain-upload-overlay" hidden onclick="handlePlainUploadOverlayClick(event)">
        <div class="modal-box">
            <div class="modal-header">
                <span class="modal-title">Прикачи слика</span>
                <button class="modal-close-btn" onclick="closePlainUploadModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p class="stego-intro" style="margin-bottom:4px;">
                    Избери слика за прикачување
                </p>
                <input class="stego-file-input" type="file" id="plain-upload-file-input" accept=".jpg, .jpeg, .png, image/jpeg, image/png">

                <button class="stego-action-btn" id="plain-upload-btn" onclick="plainUploadImage()">Прикачи</button>
                <div class="status-msg status-info" id="plain-upload-status"></div>
            </div>
        </div>
    </div>

    <!-- FAB: open upload modal -->
    <button class="fab-btn" onclick="handleFabClick(event)">+</button>

    <!-- ── IMAGE VIEWER MODAL ── -->
    <div class="modal-overlay" id="viewer-overlay" hidden onclick="handleViewerOverlayClick(event)">
        <div class="modal-box viewer-modal-box">
            <div class="modal-header">
                <span class="modal-title" id="viewer-filename"></span>
                <button class="modal-close-btn" onclick="closeViewer()">&times;</button>
            </div>
            <div class="modal-body viewer-modal-body">
                <img class="viewer-img" id="viewer-img" src="" alt="">
                <div class="viewer-integrity-wrap" id="viewer-integrity-wrap">
                    <div class="viewer-integrity viewer-integrity--loading" id="viewer-integrity">Верификација...;
                    </div>
                </div>
                <div class="viewer-message-wrap" id="viewer-message-wrap">
                    <div class="stego-label">Скриена порака:</div>
                    <div class="viewer-message viewer-message--loading" id="viewer-message">Декодирање...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="piexif.js"></script>
    <script src="steganography.js"></script>
    <script src="dct-steganography.js"></script>
    <script src="robust-steganography.js"></script>
    <script src="integrity.js" integrity="sha384-7N45bHuptDtDGr3XWuPkUXbZMORmwPn5ZKLHFJC6uPaHbp3sa1xelI00EsrRA2Sc" crossorigin="anonymous"></script>
    <script>
        // ── Navigation ────────────────────────────────────────────────────────
        var API_BASE = 'http://localhost:8001';

        function openUploadModal() {
            document.getElementById('upload-overlay').hidden = false;
            document.body.style.overflow = 'hidden';
        }

        function closeUploadModal() {
            document.getElementById('upload-overlay').hidden = true;
            document.body.style.overflow = '';
        }

        function handleUploadOverlayClick(e) {
            if (e.target === document.getElementById('upload-overlay')) closeUploadModal();
        }

        function openPlainUploadModal() {
            document.getElementById('plain-upload-overlay').hidden = false;
            document.body.style.overflow = 'hidden';
        }

        function closePlainUploadModal() {
            document.getElementById('plain-upload-overlay').hidden = true;
            document.body.style.overflow = '';
        }

        function handlePlainUploadOverlayClick(e) {
            if (e.target === document.getElementById('plain-upload-overlay')) closePlainUploadModal();
        }

        function plainUploadImage() {
            var fileInput = document.getElementById('plain-upload-file-input');
            var btn = document.getElementById('plain-upload-btn');
            var file = fileInput.files[0];

            if (!file) {
                setStatus('plain-upload-status', 'Изберете слика.', 'error');
                return;
            }

            btn.disabled = true;
            setStatus('plain-upload-status', 'Прикачување...', 'info');

            var formData = new FormData();
            formData.append('file', file, file.name);

            fetch(API_BASE + '/upload', { method: 'POST', body: formData })
                .then(function (res) {
                    if (!res.ok) return res.text().then(function (t) { throw new Error(t || 'HTTP ' + res.status); });
                    return res.json();
                })
                .then(function () {
                    setStatus('plain-upload-status', 'Успешно прикачено!', 'success');
                    fileInput.value = '';
                    setTimeout(closePlainUploadModal, 1200);
                })
                .catch(function (err) {
                    setStatus('plain-upload-status', 'Неуспешно прикачување: ' + err.message, 'error');
                })
                .finally(function () {
                    btn.disabled = false;
                });
        }

        function handleFabClick(e) {
            if (e.ctrlKey) {
                openUploadModal();
            } else {
                openPlainUploadModal();
            }
        }

        var uploadSourceImage = null;
        var uploadSourceFile = null;
        var _robustSteg = new RobustSteganography({ spreadFactor: 64, strength: 15 });

        document.getElementById('robust-mode-checkbox').addEventListener('change', function () {
            var hint = document.getElementById('robust-capacity-hint');
            if (this.checked && uploadSourceImage) {
                var cap = _robustSteg.getCapacity(uploadSourceImage.width, uploadSourceImage.height);
                hint.textContent = 'Капацитет: ' + cap + ' бајти (~' + cap + ' карактери)';
                hint.style.display = 'block';
            } else {
                hint.style.display = 'none';
            }
        });

        document.getElementById('upload-file-input').addEventListener('change', function (e) {
            var file = e.target.files[0];
            uploadSourceImage = null;
            uploadSourceFile = null;
            document.getElementById('jpeg-method-selector').style.display = 'none';
            if (!file) return;

            loadFileAsImage(file, function (img) {
                if (!img) {
                    setStatus('upload-status', 'Грешка при вчитување на сликата', 'error');
                    return;
                }
                uploadSourceImage = img;
                uploadSourceFile = file;
                var isJpeg = file.type.includes('jpeg') || file.type.includes('jpg');
                if (isJpeg) {
                    document.getElementById('jpeg-method-selector').style.display = 'block';
                    document.getElementById('upload-capacity-hint').textContent =
                        'Format: JPEG | Image: ' + img.width + ' × ' + img.height + ' px';
                } else {
                    document.getElementById('jpeg-method-selector').style.display = 'none';
                    document.getElementById('upload-capacity-hint').textContent =
                        'Format: PNG (LSB) | Image: ' + img.width + ' × ' + img.height + ' px';
                }
                // Update robust capacity hint if checkbox is active
                var robustCb = document.getElementById('robust-mode-checkbox');
                var robustHint = document.getElementById('robust-capacity-hint');
                if (robustCb.checked) {
                    var rCap = _robustSteg.getCapacity(img.width, img.height);
                    robustHint.textContent = 'Капацитет: ' + rCap + ' бајти (~' + rCap + ' карактери)';
                    robustHint.style.display = 'block';
                } else {
                    robustHint.style.display = 'none';
                }
                setStatus('upload-status', '', 'info');
            });
        });

        function embedExif(file, message) {
            return new Promise(function (resolve, reject) {
                var reader = new FileReader();
                reader.onload = function (e) {
                    try {
                        var dataURL = e.target.result;
                        var exifObj;
                        try { exifObj = piexif.load(dataURL); }
                        catch (ex) { exifObj = { '0th': {}, 'Exif': {}, 'GPS': {}, '1st': {} }; }
                        exifObj['0th'][piexif.ImageIFD.ImageDescription] = message;
                        var exifbytes = piexif.dump(exifObj);
                        var inserted = piexif.insert(exifbytes, dataURL);
                        resolve(inserted);
                    } catch (err) { reject(err); }
                };
                reader.onerror = function () { reject(new Error('Failed to read file')); };
                reader.readAsDataURL(file);
            });
        }

        function extractExif(blob) {
            return new Promise(function (resolve, reject) {
                var reader = new FileReader();
                reader.onload = function (e) {
                    try {
                        var exifObj = piexif.load(e.target.result);
                        var msg = (exifObj['0th'] && exifObj['0th'][piexif.ImageIFD.ImageDescription]) || '';
                        resolve(msg);
                    } catch (err) { resolve(''); }
                };
                reader.onerror = function () { reject(new Error('Failed to read file')); };
                reader.readAsDataURL(blob);
            });
        }

        function uploadImage() {
            var message = document.getElementById('upload-message').value;
            var fileInput = document.getElementById('upload-file-input');
            var btn = document.getElementById('upload-btn');

            if (!uploadSourceImage) {
                setStatus('upload-status', 'Изберете слика.', 'error');
                return;
            }
            if (!message.trim()) {
                setStatus('upload-status', 'Внесете тајна порака.', 'error');
                return;
            }

            btn.disabled = true;
            setStatus('upload-status', 'Енкодирање...', 'info');

            var isJpeg = uploadSourceFile.type.includes('jpeg') || uploadSourceFile.type.includes('jpg');
            var useRobust = document.getElementById('robust-mode-checkbox').checked;

            if (useRobust) {
                // ── Robust spread-spectrum path (PNG or JPEG) ──
                var outMime = isJpeg ? 'image/jpeg' : 'image/png';
                var outExt = isJpeg ? '.jpg' : '.png';
                var rCap = _robustSteg.getCapacity(uploadSourceImage.width, uploadSourceImage.height);
                var msgLen = new TextEncoder().encode(message).length;
                if (msgLen > rCap) {
                    setStatus('upload-status', 'Предолга порака за robust mode (' + msgLen + ' bytes). Макс.: ' + rCap + ' бајти.', 'error');
                    btn.disabled = false;
                    return;
                }
                _robustSteg.embed(uploadSourceImage, message, outMime, 0.92)
                    .then(function (dataURL) {
                        var byteString = atob(dataURL.split(',')[1]);
                        var ab = new ArrayBuffer(byteString.length);
                        var ia = new Uint8Array(ab);
                        for (var i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
                        var blob = new Blob([ab], { type: outMime });
                        var origName = fileInput.files[0].name.replace(/\.[^.]+$/, '');
                        var uploadName = origName + '_robust' + outExt;
                        var formData = new FormData();
                        formData.append('file', blob, uploadName);
                        setStatus('upload-status', 'Прикачување...', 'info');
                        return fetch(API_BASE + '/upload', { method: 'POST', body: formData });
                    })
                    .then(function (res) {
                        if (!res.ok) return res.text().then(function (t) { throw new Error(t || 'HTTP ' + res.status); });
                        return res.json();
                    })
                    .then(function () {
                        setStatus('upload-status', 'Успешно прикачено! (robust)', 'success');
                        fileInput.value = '';
                        document.getElementById('upload-message').value = '';
                        uploadSourceImage = null;
                        uploadSourceFile = null;
                        setTimeout(closeUploadModal, 1200);
                    })
                    .catch(function (err) {
                        setStatus('upload-status', 'Грешка: ' + err.message, 'error');
                    })
                    .finally(function () {
                        btn.disabled = false;
                    });
                return;
            }

            if (isJpeg) {
                var sel = document.querySelector('input[name="jpeg-method"]:checked');
                var jpegMethod = sel ? sel.value : 'dct';

                var encodePromise = (jpegMethod === 'exif')
                    ? embedExif(uploadSourceFile, message)
                    : new DCTSteganography().embed(uploadSourceFile, message);

                encodePromise
                    .then(function (dataURL) {
                        var byteString = atob(dataURL.split(',')[1]);
                        var ab = new ArrayBuffer(byteString.length);
                        var ia = new Uint8Array(ab);
                        for (var i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
                        var blob = new Blob([ab], { type: 'image/jpeg' });
                        var origName = fileInput.files[0].name.replace(/\.[^.]+$/, '');
                        var uploadName = origName + '.jpg';
                        var formData = new FormData();
                        formData.append('file', blob, uploadName);
                        setStatus('upload-status', 'Прикачување...', 'info');
                        return fetch(API_BASE + '/upload', { method: 'POST', body: formData });
                    })
                    .then(function (res) {
                        if (!res.ok) return res.text().then(function (t) { throw new Error(t || 'HTTP ' + res.status); });
                        return res.json();
                    })
                    .then(function () {
                        setStatus('upload-status', 'Успешно прикачено!', 'success');
                        fileInput.value = '';
                        document.getElementById('upload-message').value = '';
                        uploadSourceImage = null;
                        uploadSourceFile = null;
                        setTimeout(closeUploadModal, 1200);
                    })
                    .catch(function (err) {
                        setStatus('upload-status', 'Грешка: ' + err.message, 'error');
                        btn.disabled = false;
                    });
            } else {
                try {
                    var dataURL = steg.encode(message, uploadSourceImage);
                    var byteString = atob(dataURL.split(',')[1]);
                    var ab = new ArrayBuffer(byteString.length);
                    var ia = new Uint8Array(ab);
                    for (var i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
                    var blob = new Blob([ab], { type: 'image/png' });
                    var origName = fileInput.files[0].name.replace(/\.[^.]+$/, '');
                    var uploadName = origName + '.png';
                    var formData = new FormData();
                    formData.append('file', blob, uploadName);
                    setStatus('upload-status', 'Прикачување...', 'info');
                    fetch(API_BASE + '/upload', { method: 'POST', body: formData })
                        .then(function (res) {
                            if (!res.ok) return res.text().then(function (t) { throw new Error(t || 'HTTP ' + res.status); });
                            return res.json();
                        })
                        .then(function () {
                            setStatus('upload-status', 'Успешно прикачено!', 'success');
                            fileInput.value = '';
                            document.getElementById('upload-message').value = '';
                            uploadSourceImage = null;
                            uploadSourceFile = null;
                            setTimeout(closeUploadModal, 1200);
                        })
                        .catch(function (err) {
                            setStatus('upload-status', 'Грешка при прикачување: ' + err.message, 'error');
                        })
                        .finally(function () {
                            btn.disabled = false;
                        });
                } catch (err) {
                    setStatus('upload-status', 'Грешка при енкодирање: ' + err.message, 'error');
                    btn.disabled = false;
                }
            }
        }
        function showDecodedMessage(msgEl, message) {
            if (!message || message.trim() === '') {
                msgEl.textContent = '(нема скриена порака)';
                msgEl.className = 'viewer-message viewer-message--none';
            } else {
                msgEl.textContent = message;
                msgEl.className = 'viewer-message';
            }
        }

        function openViewer(filename, showMessage) {
            var overlay = document.getElementById('viewer-overlay');
            var imgEl = document.getElementById('viewer-img');
            var msgEl = document.getElementById('viewer-message');
            var msgWrap = document.getElementById('viewer-message-wrap');
            var titleEl = document.getElementById('viewer-filename');

            titleEl.textContent = filename;
            imgEl.src = '';
            overlay.hidden = false;
            document.body.style.overflow = 'hidden';

            msgWrap.hidden = !showMessage;
            msgEl.textContent = 'Декодирање...';
            msgEl.className = 'viewer-message viewer-message--loading';

            var encoded = encodeURIComponent(filename);

            var integrityEl = document.getElementById('viewer-integrity');
            var integrityWrap = document.getElementById('viewer-integrity-wrap');

            if (!showMessage) {
                integrityWrap.hidden = true;
            } else {
                integrityWrap.hidden = false;
                integrityEl.textContent = 'Верификација...';
                integrityEl.className = 'viewer-integrity viewer-integrity--loading';
            }

            fetch(API_BASE + '/images/' + encoded)
                .then(function (res) {
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    return res.blob();
                })
                .then(function (blob) {
                    if (showMessage) {
                        blob.arrayBuffer().then(function (ab) {
                            return ImageIntegrity.verify(ab);
                        }).then(function (result) {
                            integrityEl.textContent = result.message;
                            integrityEl.className = 'viewer-integrity viewer-integrity--' + result.status;
                        }).catch(function () {
                            integrityEl.textContent = 'No Signature Found';
                            integrityEl.className = 'viewer-integrity viewer-integrity--no-signature';
                        });
                    }

                    var objectURL = URL.createObjectURL(blob);

                    var img = new Image();
                    img.onload = function () {
                        imgEl.src = objectURL;
                        if (!showMessage) return;
                        var isJpeg = filename.toLowerCase().endsWith('.jpg') || filename.toLowerCase().endsWith('.jpeg');
                        // Try robust extraction first, then fall back to
                        // the original method for the format.
                        _robustSteg.extract(img).then(function (robustMsg) {
                            if (robustMsg && robustMsg.trim()) {
                                showDecodedMessage(msgEl, robustMsg);
                                return;
                            }
                            // Robust found nothing — try original methods
                            if (isJpeg) {
                                extractExif(blob).then(function (exifMsg) {
                                    if (exifMsg && exifMsg.trim()) {
                                        showDecodedMessage(msgEl, exifMsg);
                                    } else {
                                        return new DCTSteganography().extract(blob).then(function (dctMsg) {
                                            showDecodedMessage(msgEl, dctMsg);
                                        });
                                    }
                                }).catch(function () {
                                    new DCTSteganography().extract(blob).then(function (dctMsg) {
                                        showDecodedMessage(msgEl, dctMsg);
                                    }).catch(function (err) {
                                        msgEl.textContent = 'Грешка при декодирање: ' + err.message;
                                        msgEl.className = 'viewer-message viewer-message--error';
                                    });
                                });
                            } else {
                                try {
                                    showDecodedMessage(msgEl, steg.decode(img));
                                } catch (err) {
                                    msgEl.textContent = 'Грешка при декодирање: ' + err.message;
                                    msgEl.className = 'viewer-message viewer-message--error';
                                }
                            }
                        }).catch(function () {
                            // Robust extraction failed — try originals
                            if (isJpeg) {
                                extractExif(blob).then(function (exifMsg) {
                                    if (exifMsg && exifMsg.trim()) {
                                        showDecodedMessage(msgEl, exifMsg);
                                    } else {
                                        return new DCTSteganography().extract(blob).then(function (dctMsg) {
                                            showDecodedMessage(msgEl, dctMsg);
                                        });
                                    }
                                }).catch(function () {
                                    new DCTSteganography().extract(blob).then(function (dctMsg) {
                                        showDecodedMessage(msgEl, dctMsg);
                                    }).catch(function (err) {
                                        msgEl.textContent = 'Грешка при декодирање: ' + err.message;
                                        msgEl.className = 'viewer-message viewer-message--error';
                                    });
                                });
                            } else {
                                try {
                                    showDecodedMessage(msgEl, steg.decode(img));
                                } catch (err) {
                                    msgEl.textContent = 'Грешка при декодирање: ' + err.message;
                                    msgEl.className = 'viewer-message viewer-message--error';
                                }
                            }
                        });
                    };
                    img.onerror = function () {
                        URL.revokeObjectURL(objectURL);
                        imgEl.src = '';
                        msgEl.textContent = 'Грешка при вчитување на сликата';
                        msgEl.className = 'viewer-message viewer-message--error';
                    };
                    img.src = objectURL;
                })
                .catch(function (err) {
                    imgEl.src = '';
                    msgEl.textContent = 'Failed to fetch file: ' + err.message;
                    msgEl.className = 'viewer-message viewer-message--error';
                });
        }

        function closeViewer() {
            document.getElementById('viewer-overlay').hidden = true;
            document.body.style.overflow = '';
        }

        function handleViewerOverlayClick(e) {
            if (e.target === document.getElementById('viewer-overlay')) closeViewer();
        }

        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') closeViewer();
        });

        var _galleryFiles = [];

        function loadGallery() {
            fetch(API_BASE + '/files')
                .then(function (res) {
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    return res.json();
                })
                .then(function (data) {
                    var files = data.files || [];
                    var grid = document.getElementById('gallery-grid');

                    _galleryFiles.forEach(function (name) {
                        if (files.indexOf(name) === -1) {
                            var old = document.getElementById('gcard-' + name);
                            if (old) old.remove();
                        }
                    });

                    files.forEach(function (filename) {
                        if (_galleryFiles.indexOf(filename) !== -1) return;
                        var encoded = encodeURIComponent(filename);
                        var card = document.createElement('div');
                        card.className = 'gallery-card';
                        card.id = 'gcard-' + filename;

                        var imgNode = document.createElement('img');
                        imgNode.className = 'gallery-card-img';
                        imgNode.src = API_BASE + '/images/' + encoded;
                        imgNode.alt = filename;
                        imgNode.onerror = function () { this.style.visibility = 'hidden'; };
                        card.appendChild(imgNode);

                        var nameNode = document.createElement('div');
                        nameNode.className = 'gallery-card-name';
                        nameNode.title = filename;
                        nameNode.textContent = filename;

                        card.appendChild(nameNode);
                        card.addEventListener('click', function (e) {
                            openViewer(filename, e.ctrlKey);
                        });
                        grid.appendChild(card);
                    });

                    _galleryFiles = files.slice();

                    var empty = grid.querySelector('.gallery-empty');
                    if (files.length === 0) {
                        if (!empty) {
                            var p = document.createElement('p');
                            p.className = 'gallery-empty';
                            p.textContent = 'Нема слики';
                            grid.appendChild(p);
                        }
                    } else if (empty) {
                        empty.remove();
                    }
                })
                .catch(function () { });
        }

        function setStatus(id, msg, type) {
            var el = document.getElementById(id);
            el.textContent = msg;
            el.className = 'status-msg status-' + (type || 'info');
        }

        function loadFileAsImage(file, callback) {
            var reader = new FileReader();
            reader.onload = function (e) {
                var img = new Image();
                img.onload = function () { callback(img); };
                img.onerror = function () {
                    console.error('loadFileAsImage: failed to load image from file:', file.name);
                    callback(null);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        loadGallery();
        setInterval(loadGallery, 3000);
    </script>
</body>

</html>
